<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Extern Outreach Tool</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f7; --bg-card: #ffffff; --bg-sec: #f2f0ec; --text: #1c1c1a;
  --text-muted: #7a7872; --text-light: #a8a49e; --accent: #2a5c45;
  --accent-bg: #eaf3ee; --accent-text: #1a3d2d; --border: #e4e1db;
  --border-strong: #c8c4bc; --amber-bg: #fef3e2; --amber-text: #7a4f0d;
  --blue-bg: #e8f0fe; --blue-text: #1a3a6b; --info-bg: #e8f0fe;
  --info-text: #1a3a6b; --info-border: #b5cef4; --r: 10px; --rs: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --bg-card: #1e1d1a; --bg-sec: #252420; --text: #f0ede8;
    --text-muted: #8a8680; --text-light: #5a5750; --accent: #4a9e72;
    --accent-bg: #1a2e22; --accent-text: #7dd4a8; --border: #2e2c28;
    --border-strong: #3e3c38; --amber-bg: #2a1e08; --amber-text: #f0b840;
    --blue-bg: #0e1a30; --blue-text: #7aaef0; --info-bg: #0e1a30;
    --info-text: #7aaef0; --info-border: #1e3a6b;
  }
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
.app { max-width: 820px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
.key-bar { display: flex; gap: 8px; align-items: center; background: var(--bg-sec); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 14px; margin-bottom: 1.5rem; }
.key-bar label { font-size: 12px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
.key-bar input { flex: 1; border: none; background: transparent; font-family: monospace; font-size: 12px; color: var(--text); outline: none; min-width: 0; }
.key-bar input::placeholder { color: var(--text-light); }
.key-status { font-size: 11px; white-space: nowrap; }
.key-status.ok { color: #085041; }
.key-status.err { color: #a32d2d; }
.step-bar { display: flex; margin-bottom: 1.5rem; }
.step-item { flex: 1; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); }
.step-item:first-child { border-radius: var(--r) 0 0 var(--r); }
.step-item:last-child { border-radius: 0 var(--r) var(--r) 0; border-left: none; }
.step-item:not(:first-child):not(:last-child) { border-left: none; }
.step-item.active { background: var(--info-bg); border-color: var(--info-border); }
.step-num { font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.step-label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.step-item.active .step-label { color: var(--info-text); }
.step-item.done .step-label { color: var(--text); }
input[type=text], input[type=password] { padding: 9px 12px; font-size: 14px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--rs); background: var(--bg-card); color: var(--text); outline: none; width: 100%; }
input[type=text]:focus, input[type=password]:focus { border-color: var(--accent); }
button { padding: 9px 18px; font-size: 13px; font-weight: 500; font-family: inherit; border: 1px solid var(--border-strong); border-radius: var(--rs); background: var(--bg-card); color: var(--text); cursor: pointer; }
button:hover { background: var(--bg-sec); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.primary { background: var(--accent); color: #fff; border-color: transparent; }
button.primary:hover { opacity: 0.88; background: var(--accent); }
.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-row input { flex: 1; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.pill { font-size: 12px; padding: 4px 12px; border-radius: 999px; cursor: pointer; border: 1px solid var(--border-strong); color: var(--text-muted); background: transparent; font-family: inherit; }
.pill.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
.cards { display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; }
.card.selected { border-color: var(--info-border); background: var(--info-bg); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.badge { font-size: 11px; padding: 2px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
.b1 { background: #faeeda; color: #633806; }
.b2 { background: #e1f5ee; color: #085041; }
.b3 { background: #e6f1fb; color: #0c447c; }
.bn { background: var(--bg-sec); color: var(--text-muted); }
.card-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.m { font-size: 12px; color: var(--text-muted); }
.ml { font-weight: 500; color: var(--text); }
.ind-tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--bg-sec); color: var(--text-muted); border: 1px solid var(--border); }
.summary { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.pitch-box { background: var(--bg-sec); border-radius: var(--rs); padding: 10px 12px; margin-bottom: 10px; }
.pitch-lbl { font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
.pitch-txt { font-size: 13px; line-height: 1.5; }
.select-btn { font-size: 12px; padding: 5px 14px; border-color: var(--info-border); color: var(--info-text); background: transparent; }
.card.selected .select-btn { background: var(--info-bg); }
.empty { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 14px; }
.result-count { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.anchor-box { background: var(--info-bg); border: 1px solid var(--info-border); border-radius: var(--r); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.anchor-lbl { font-size: 10px; font-weight: 500; color: var(--info-text); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.anchor-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.anchor-meta { font-size: 12px; color: var(--text-muted); }
.sec-label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
.sec-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.brand-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.brand-num { font-size: 12px; color: var(--text-light); font-family: monospace; width: 18px; flex-shrink: 0; }
.brand-row input { flex: 1; width: auto; }
.style-pills { display: flex; gap: 8px; margin-top: 8px; margin-bottom: 1.5rem; }
.style-pill { font-size: 12px; padding: 5px 14px; border-radius: 999px; cursor: pointer; border: 1px solid var(--border-strong); color: var(--text-muted); background: transparent; font-family: inherit; text-transform: capitalize; }
.style-pill.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
.btn-row { display: flex; gap: 8px; }
.msg-cluster { margin-bottom: 2rem; }
.cluster-hdr { font-size: 13px; font-weight: 500; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.brand-badge { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--info-bg); color: var(--info-text); border: 1px solid var(--info-border); }
.msg-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; margin-bottom: 8px; }
.msg-lbl { font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.msg-txt { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
.msg-footer { display: flex; align-items: center; justify-content: space-between; }
.char-ok { font-size: 11px; font-family: monospace; color: #085041; }
.char-warn { font-size: 11px; font-family: monospace; color: #a32d2d; }
.copy-btn { font-size: 12px; padding: 4px 12px; }
.copy-btn.copied { color: #085041; border-color: #085041; }
.titles-box { background: var(--bg-sec); border-radius: var(--rs); padding: 10px 12px; }
.titles-lbl { font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
.titles-txt { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.err-msg { font-size: 13px; color: #a32d2d; padding: 8px 12px; background: #fcebeb; border-radius: var(--rs); margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">
  <h1>Extern outreach tool</h1>
  <p class="sub">Find capstone proof points, pick your brands, generate LinkedIn messages.</p>

  <div class="key-bar">
    <label>API key</label>
    <input type="password" id="api-key" placeholder="sk-ant-... (get yours free at console.anthropic.com)" onkeydown="if(event.key==='Enter')saveKey()" />
    <span class="key-status" id="key-status"></span>
    <button onclick="saveKey()" style="padding:5px 12px;font-size:12px;">Save</button>
  </div>

  <div class="step-bar">
    <div class="step-item active" id="stab-0"><div class="step-num">Step 1</div><div class="step-label">Find capstone</div></div>
    <div class="step-item" id="stab-1"><div class="step-num">Step 2</div><div class="step-label">Add brands</div></div>
    <div class="step-item" id="stab-2"><div class="step-num">Step 3</div><div class="step-label">Get messages</div></div>
  </div>

  <div id="panel-0">
    <div class="search-row">
      <input type="text" id="q" placeholder="e.g. Gen Z loyalty, influencer marketing, brand strategy..." onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="primary" id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div class="filters">
      <button class="pill active" data-k="all" onclick="setFilter(this)">All</button>
      <button class="pill" data-k="media" onclick="setFilter(this)">Media & Entertainment</button>
      <button class="pill" data-k="tech" onclick="setFilter(this)">Tech / SaaS</button>
      <button class="pill" data-k="beauty" onclick="setFilter(this)">Beauty & Consumer</button>
      <button class="pill" data-k="retail" onclick="setFilter(this)">Retail & E-commerce</button>
      <button class="pill" data-k="fashion" onclick="setFilter(this)">Fashion</button>
      <button class="pill" data-k="food" onclick="setFilter(this)">Food & Beverage</button>
      <button class="pill" data-k="sports" onclick="setFilter(this)">Sports & Lifestyle</button>
      <button class="pill" data-k="finance" onclick="setFilter(this)">Finance & Fintech</button>
    </div>
    <div id="results"><div class="empty">Enter your API key above, then search a topic to get started.</div></div>
  </div>

  <div id="panel-1" style="display:none">
    <div class="anchor-box" id="anchor-box"></div>
    <label class="sec-label">Target brands</label>
    <p class="sec-hint">Enter up to 5 brands to pitch using this capstone as proof.</p>
    <div class="brand-row"><span class="brand-num">1.</span><input type="text" class="bi" placeholder="e.g. Dunkin" /></div>
    <div class="brand-row"><span class="brand-num">2.</span><input type="text" class="bi" placeholder="e.g. Dutch Bros" /></div>
    <div class="brand-row"><span class="brand-num">3.</span><input type="text" class="bi" placeholder="e.g. Sweetgreen" /></div>
    <div class="brand-row"><span class="brand-num">4.</span><input type="text" class="bi" placeholder="optional" /></div>
    <div class="brand-row"><span class="brand-num">5.</span><input type="text" class="bi" placeholder="optional" /></div>
    <label class="sec-label" style="margin-top:1.25rem;">Message style</label>
    <div class="style-pills">
      <button class="style-pill active" data-s="standard" onclick="setStyle(this)">Standard</button>
      <button class="style-pill" data-s="punchy" onclick="setStyle(this)">Punchy</button>
      <button class="style-pill" data-s="both" onclick="setStyle(this)">Both</button>
    </div>
    <div id="gen-err" style="display:none" class="err-msg"></div>
    <div class="btn-row">
      <button onclick="goPanel(0)">Back</button>
      <button class="primary" id="gen-btn" onclick="doGenerate()">Generate messages</button>
    </div>
  </div>

  <div id="panel-2" style="display:none">
    <div id="messages-out"></div>
    <div class="btn-row" style="margin-top:1.25rem">
      <button onclick="resetAll()">Search new topic</button>
      <button onclick="goPanel(1)">Edit brands</button>
    </div>
  </div>
</div>

<script>
let apiKey='', allCards=[], activeFilter='all', anchor=null, msgStyle='standard';

function saveKey(){
  const v=document.getElementById('api-key').value.trim();
  const s=document.getElementById('key-status');
  if(!v.startsWith('sk-ant-')){s.textContent='Invalid key format';s.className='key-status err';return;}
  apiKey=v; s.textContent='Ready'; s.className='key-status ok';
  document.getElementById('results').innerHTML='<div class="empty">Search a topic to find capstone projects to anchor your outreach.</div>';
}

function guessKey(s){
  s=(s||'').toLowerCase();
  if(s.includes('media')||s.includes('entertainment')||s.includes('streaming'))return'media';
  if(s.includes('tech')||s.includes('saas')||s.includes('software'))return'tech';
  if(s.includes('beauty')||s.includes('cosmetic')||s.includes('consumer'))return'beauty';
  if(s.includes('retail')||s.includes('e-commerce')||s.includes('ecommerce'))return'retail';
  if(s.includes('fashion')||s.includes('apparel')||s.includes('clothing'))return'fashion';
  if(s.includes('food')||s.includes('beverage')||s.includes('restaurant'))return'food';
  if(s.includes('sport')||s.includes('lifestyle')||s.includes('fitness'))return'sports';
  if(s.includes('financ')||s.includes('fintech')||s.includes('bank'))return'finance';
  return'tech';
}

async function callClaude(prompt, maxTokens){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=(data.content||[]).map(b=>b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

function goPanel(n){
  [0,1,2].forEach(i=>{
    document.getElementById('panel-'+i).style.display=i===n?'block':'none';
    const t=document.getElementById('stab-'+i);
    t.classList.toggle('active',i===n);
    if(i<n)t.classList.add('done');
  });
}

function setFilter(el){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); activeFilter=el.dataset.k; renderCards();
}

function setStyle(el){
  document.querySelectorAll('.style-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); msgStyle=el.dataset.s;
}

function renderCards(){
  const area=document.getElementById('results');
  const filtered=activeFilter==='all'?allCards:allCards.filter(c=>c.industryKey===activeFilter);
  if(!filtered.length){area.innerHTML='<div class="empty">No projects match this filter.</div>';return;}
  area.innerHTML='<div class="result-count">'+filtered.length+' project'+(filtered.length!==1?'s':'')+' found — select one to anchor your outreach</div><div class="cards">'+filtered.map((c,i)=>cardHTML(c,i)).join('')+'</div>';
}

function cardHTML(c,i){
  const bc=i===0?'b1':i===1?'b2':i===2?'b3':'bn';
  const bl=i===0?'Top match':i===1?'2nd':i===2?'3rd':'#'+(i+1);
  const sel=anchor&&anchor.title===c.title;
  return'<div class="card'+(sel?' selected':'')+'"><div class="card-top"><span class="card-title">'+c.title+'</span><span class="badge '+bc+'">'+bl+'</span></div><div class="card-meta"><span class="m"><span class="ml">Partner:</span> '+c.partner+'</span><span class="m"><span class="ml">University:</span> '+c.university+'</span><span class="m"><span class="ml">Year:</span> '+c.year+'</span><span class="ind-tag">'+c.industry+'</span></div><p class="summary">'+c.summary+'</p><div class="pitch-box"><div class="pitch-lbl">Pitch angle</div><div class="pitch-txt">'+c.pitch+'</div></div><button class="select-btn" onclick="selectCard('+i+')">'+(sel?'Selected':'Use this capstone')+'</button></div>';
}

function selectCard(i){
  const filtered=activeFilter==='all'?allCards:allCards.filter(c=>c.industryKey===activeFilter);
  anchor=filtered[i]; renderCards();
  document.getElementById('anchor-box').innerHTML='<div class="anchor-lbl">Selected capstone</div><div class="anchor-title">'+anchor.title+'</div><div class="anchor-meta">'+anchor.university+' + '+anchor.partner+' &middot; '+anchor.year+' &middot; '+anchor.industry+'</div>';
  goPanel(1);
}

async function doSearch(){
  if(!apiKey){document.getElementById('results').innerHTML='<div class="empty">Please save your API key first.</div>';return;}
  const q=document.getElementById('q').value.trim(); if(!q)return;
  const area=document.getElementById('results'), btn=document.getElementById('search-btn');
  area.innerHTML='<div class="empty">Searching...</div>'; btn.disabled=true;
  try{
    const parsed=await callClaude('Find 6-8 real or highly representative university capstone/MBA/undergraduate consulting projects related to: "'+q+'"\n\nReturn a JSON array. Each object:\n- title\n- partner: real brand name\n- university\n- year: string 2018-2024\n- industry: one of: Media & Entertainment, Tech / SaaS, Beauty & Consumer, Retail & E-commerce, Fashion, Food & Beverage, Sports & Lifestyle, Finance & Fintech\n- summary: 1-2 sentences\n- pitch: 1-sentence LinkedIn pitch proving Gen Z student interest, no em dashes\n- appealScore: integer 1-10\n\nSort by appealScore descending. Return ONLY valid JSON array, no markdown.',1500);
    allCards=parsed.map(c=>({...c,industryKey:guessKey(c.industry)})); renderCards();
  }catch(e){area.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
  btn.disabled=false;
}

async function doGenerate(){
  const brands=[...document.querySelectorAll('.bi')].map(i=>i.value.trim()).filter(Boolean);
  if(!brands.length||!anchor)return;
  const btn=document.getElementById('gen-btn'), errEl=document.getElementById('gen-err');
  btn.disabled=true; errEl.style.display='none';
  const sn=msgStyle==='standard'?'Write 1 message per brand: warm, direct, references the capstone and university+partner, no-cost framing, 1 hr/month.':msgStyle==='punchy'?'Write 1 message per brand: punchy, short sentences, lead with the capstone result, emphasize students do the work.':'Write 2 messages per brand: one labeled Standard (warm, direct) and one labeled Punchy (shorter, leads with value).';
  try{
    const parsed=await callClaude('You are helping Tori, a Partnerships Intern at Extern, draft LinkedIn connection messages.\n\nCapstone: "'+anchor.title+'" — '+anchor.university+' + '+anchor.partner+' ('+anchor.year+')\nPitch: '+anchor.pitch+'\nBrands: '+brands.join(', ')+'\n\n'+sn+'\n\nRules:\n- Start: "Hey [Name]! I\'m Tori, I work with Extern."\n- Reference the specific university and capstone partner\n- Brand name already filled in\n- End: "Just 1 hr/month to mentor, interested?"\n- Under 300 characters\n- No em dashes\n- Casual, not corporate\n\nAlso suggest 3 LinkedIn titles per brand.\n\nReturn ONLY valid JSON array. Each object:\n- brand\n- messages: [{label, text}]\n- titles: [3 strings]\nNo markdown.',2000);
    renderMessages(parsed); goPanel(2);
  }catch(e){errEl.textContent='Error: '+e.message; errEl.style.display='block';}
  btn.disabled=false;
}

function renderMessages(data){
  document.getElementById('messages-out').innerHTML=data.map(function(item){
    return'<div class="msg-cluster"><div class="cluster-hdr"><span class="brand-badge">'+item.brand+'</span></div>'+(item.messages||[]).map(function(msg,mi){
      const chars=msg.text.length, id='mt-'+item.brand.replace(/\s+/g,'')+'-'+mi;
      return'<div class="msg-card"><div class="msg-lbl">'+msg.label+'</div><div class="msg-txt" id="'+id+'">'+msg.text+'</div><div class="msg-footer"><span class="'+(chars<=300?'char-ok':'char-warn')+'">'+chars+'/300</span><button class="copy-btn" onclick="copyMsg(\''+id+'\',this)">Copy</button></div></div>';
    }).join('')+'<div class="titles-box"><div class="titles-lbl">LinkedIn titles to search</div><div class="titles-txt">'+(item.titles||[]).join('  &middot;  ')+'</div></div></div>';
  }).join('');
}

function copyMsg(id,btn){
  const el=document.getElementById(id); if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(function(){
    btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

function resetAll(){
  allCards=[]; anchor=null;
  document.getElementById('q').value='';
  document.querySelectorAll('.bi').forEach(function(i){i.value='';});
  document.getElementById('results').innerHTML='<div class="empty">Search a topic to find capstone projects to anchor your outreach.</div>';
  goPanel(0);
}
</script>
</body>
</html>
